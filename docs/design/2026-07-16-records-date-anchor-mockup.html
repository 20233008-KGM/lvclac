<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>기록 장부 날짜 이동 시안</title>
  <style>
    :root { color-scheme: dark; --page:#0d131c; --panel:#1c2533; --row:#151e2b; --line:#34445b; --text:#f2f6fc; --muted:#8ca0bd; --blue:#4f8dff; --green:#56c78c; --anchor:#4b5d78; }
    * { box-sizing: border-box; }
    body { margin:0; min-width:320px; background:radial-gradient(900px 480px at 56% -10%, #1d2b40 0%, transparent 68%), var(--page); color:var(--text); font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .page { min-height:100vh; padding:72px clamp(28px, 6.5vw, 112px) 18px; display:grid; grid-template-columns:minmax(280px, 500px) minmax(720px, 1fr); gap:52px; align-items:start; }
    .page-header { padding-top:0; }
    .eyebrow { margin:0 0 8px; color:#74a3dc; font-size:13px; font-weight:700; }
    h1 { margin:0 0 10px; font-size:34px; letter-spacing:-.8px; line-height:1.15; }
    .description { width:max-content; max-width:none; margin:0; color:var(--muted); font-size:14px; line-height:1.55; white-space:nowrap; }
    .ledger { justify-self:end; width:min(100%, 1040px); margin-top:110px; overflow:hidden; border:1px solid #2d3c51; border-radius:8px; background:var(--panel); box-shadow:0 18px 45px rgb(0 0 0 / 22%); }
    .toolbar { min-height:56px; display:flex; align-items:center; justify-content:space-between; gap:14px; padding:10px 16px; border-bottom:1px solid #2c3b50; background:#202a39; }
    .summary { color:#aebdd0; font-size:12px; white-space:nowrap; }
    .summary strong { color:#e9f0fb; }
    .controls { display:flex; align-items:center; gap:8px; }
    input, button { height:31px; border:1px solid #3c4e67; border-radius:6px; color:#dce7f8; font:inherit; font-size:12px; }
    input { padding:0 9px; background:#172131; }
    button { padding:0 11px; background:#263346; cursor:pointer; }
    button:hover { border-color:#6689c4; }
    button.primary { border-color:#4f8dff; background:#285cae; color:white; }
    .column-head { display:grid; grid-template-columns:minmax(0, 1fr) 92px minmax(0, 1fr); gap:12px; padding:9px 20px; border-bottom:1px solid #29384b; color:#7990ad; font-size:11px; }
    .column-head span:last-child { text-align:right; }
    .timeline { height:min(calc(100vh - 255px), 520px); min-height:420px; overflow-y:auto; overscroll-behavior:contain; padding:12px 20px 18px; scrollbar-color:#526983 transparent; scrollbar-width:thin; }
    .edge { padding:5px 0 11px; color:#71839e; font-size:11px; text-align:center; }
    .row { display:grid; grid-template-columns:minmax(0, 1fr) 92px minmax(0, 1fr); align-items:center; gap:12px; min-height:42px; }
    .record { min-height:29px; display:grid; grid-template-columns:1fr auto auto; align-items:center; gap:12px; padding:5px 9px; border:1px solid #3b4b61; border-left:3px solid var(--green); border-radius:5px; background:var(--row); font-size:12px; font-weight:650; white-space:nowrap; }
    .record.order { grid-template-columns:auto 1fr auto; border-left-color:var(--blue); }
    .record.empty { visibility:hidden; }
    .record .soft { color:#c5d2e4; font-weight:600; }
    .time { color:#92a7c2; font-size:11px; text-align:center; white-space:nowrap; }
    /* 기준선은 타임라인 내 일반 행이다. sticky/fixed를 사용하지 않는다. */
    .date-anchor { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:11px; margin:15px 0; }
    .date-anchor::before, .date-anchor::after { height:2px; border-radius:2px; background:var(--anchor); content:""; }
    .date-anchor span { padding:5px 10px; border:1px solid #465874; border-radius:999px; background:#202b3b; color:#c7d2e1; font-size:12px; font-weight:700; white-space:nowrap; }
    .load-more { border:0; height:auto; padding:6px 10px; background:transparent; color:#8ba7cf; font-size:11px; }
    .load-more:hover { text-decoration:underline; }
    @media (max-width:1100px) { .page { grid-template-columns:minmax(240px, .7fr) minmax(600px, 1.3fr); gap:30px; padding-inline:32px; } .description { width:auto; max-width:340px; white-space:normal; } .ledger { margin-top:78px; } }
    @media (max-width:850px) { .page { display:block; padding:28px 18px; } .page-header { padding-bottom:24px; } .ledger { width:100%; margin-top:0; } .timeline { height:520px; padding-inline:10px; } .column-head, .row { grid-template-columns:minmax(0,1fr) 72px minmax(0,1fr); gap:7px; } .record { gap:7px; font-size:11px; } .summary { overflow:hidden; text-overflow:ellipsis; } }
  </style>
</head>
<body>
  <!-- 디자인 시안 전용 파일입니다. 앱 컴포넌트 및 동작 코드에는 적용하지 않았습니다. -->
  <main class="page">
    <header class="page-header">
      <p class="eyebrow">마이페이지</p>
      <h1>기록 장부</h1>
      <p class="description">계좌 스냅샷과 주문기록을 하나의 시간축에 나란히 쌓아, 특정 날짜 전후의 흐름을 바로 확인합니다.</p>
    </header>

    <section class="ledger" aria-label="날짜 이동 기록 장부 시안">
      <div class="toolbar">
        <div class="summary">계좌스냅샷 <strong>총 4개 중 4개 표시 중</strong> · 주문기록 <strong>총 7개 중 7개 표시 중</strong></div>
        <div class="controls">
          <input id="date-input" type="date" value="2026-07-10" aria-label="날짜로 이동">
          <button class="primary" id="jump-button" type="button">조회</button>
        </div>
      </div>
      <div class="column-head"><span>계좌평가금　　청산버퍼　　레버리지</span><span>발생 시각</span><span>방향　　　　　　주문계약수　　　　주문가격</span></div>
      <div class="timeline" id="timeline" aria-label="장부 안에서만 스크롤되는 기록 목록">
        <div class="edge">↑ 이후 기록 · 위로 스크롤해서 확인</div>
        <div id="newer-records"></div>
        <div class="date-anchor" id="date-anchor"><span id="date-label">07.10 기준</span></div>
        <div id="older-records"></div>
        <div class="edge" id="bottom-edge"><button class="load-more" id="load-more" type="button">↓ 이전 기록 더 불러오기</button></div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const newer = [
        ["07.14 18:22", "58,012,300", "17.86%", "3.25", "short", "12", "281,500"],
        ["07.14 09:10", "", "", "", "long", "4", "279,600"],
        ["07.13 20:45", "56,945,180", "16.02%", "3.09", "", "", ""],
        ["07.13 14:05", "", "", "", "short", "-8", "282,100"],
        ["07.12 22:18", "55,734,900", "14.93%", "2.84", "", "", ""],
        ["07.12 08:34", "", "", "", "long", "16", "277,800"],
        ["07.11 19:40", "53,844,210", "12.62%", "2.71", "", "", ""],
        ["07.11 13:17", "", "", "", "long", "42", "280,000"],
        ["07.10 19:15", "", "", "", "long", "-18", "278,900"]
      ];
      const older = [
        ["07.10 09:15", "48,537,669", "20.03%", "2.42", "", "", ""],
        ["07.10 02:01", "44,127,669", "17.03%", "2.66", "", "", ""],
        ["07.09 15:03", "", "", "", "long", "42", "279,500"],
        ["07.09 15:01", "", "", "", "long", "42", "280,000"],
        ["07.09 15:00", "", "", "", "long", "-58", "279,000"],
        ["07.09 14:37", "", "", "", "long", "-58", "272,000"],
        ["07.09 14:28", "", "", "", "long", "-58", "272,000"],
        ["07.09 14:27", "", "", "", "long", "-58", "272,000"],
        ["07.08 16:23", "", "", "", "long", "5", "295,500"],
        ["07.08 07:47", "53,504,421", "8.66%", "3.36", "", "", ""],
        ["07.07 16:26", "66,554,421", "15.12%", "2.70", "", "", ""]
      ];

      const newerTarget = document.getElementById("newer-records");
      const olderTarget = document.getElementById("older-records");
      const timeline = document.getElementById("timeline");
      const anchor = document.getElementById("date-anchor");
      const dateInput = document.getElementById("date-input");
      const dateLabel = document.getElementById("date-label");
      let page = 0;
      let loading = false;

      function row([time, balance, buffer, leverage, direction, quantity, price]) {
        const snapshot = balance
          ? `<div class="record"><span>${balance}</span><span class="soft">${buffer}</span><span class="soft">${leverage}</span></div>`
          : '<div class="record empty"></div>';
        const order = direction
          ? `<div class="record order"><span>${direction}</span><span>${quantity}</span><span>${price}</span></div>`
          : '<div class="record order empty"></div>';
        return `<div class="row">${snapshot}<span class="time">${time}</span>${order}</div>`;
      }

      function centerAnchor(behavior = "smooth") {
        const timelineBox = timeline.getBoundingClientRect();
        const anchorBox = anchor.getBoundingClientRect();
        const top = timeline.scrollTop + anchorBox.top - timelineBox.top - timeline.clientHeight / 2 + anchor.offsetHeight / 2;
        timeline.scrollTo({ top, behavior });
      }

      function jumpToDate() {
        const [, month, day] = dateInput.value.split("-");
        dateLabel.textContent = `${month}.${day} 기준`;
        centerAnchor();
      }

      function loadOlder() {
        if (loading || page >= 2) return;
        loading = true;
        const extra = older.slice(page * 4, page * 4 + 4).map((item, index) => {
          const clone = [...item];
          clone[0] = `07.0${6 - page} ${["18:31", "12:04", "08:48", "01:22"][index]}`;
          return clone;
        });
        window.setTimeout(() => {
          olderTarget.insertAdjacentHTML("beforeend", extra.map(row).join(""));
          page += 1;
          loading = false;
          if (page === 2) document.getElementById("bottom-edge").textContent = "모든 이전 기록을 불러왔습니다.";
        }, 220);
      }

      newerTarget.innerHTML = newer.map(row).join("");
      olderTarget.innerHTML = older.map(row).join("");
      document.getElementById("jump-button").addEventListener("click", jumpToDate);
      dateInput.addEventListener("change", jumpToDate);
      document.getElementById("load-more").addEventListener("click", loadOlder);
      timeline.addEventListener("scroll", () => {
        if (timeline.scrollTop + timeline.clientHeight >= timeline.scrollHeight - 16) loadOlder();
      }, { passive: true });
      requestAnimationFrame(() => requestAnimationFrame(() => centerAnchor("auto")));
    })();
  </script>
</body>
</html>
