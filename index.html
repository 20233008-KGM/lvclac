<html lang="ko">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" href="/favicon.ico?v=6" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- 정식 공개 전까지 검색엔진 색인 차단. 공개 시 이 줄을 제거한다. -->
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="선물 청산가 계산기 — 계좌 평가금액과 증거금만 입력하면 청산가와 마진콜 시점을 즉시 계산합니다. Free futures liquidation calculator."
    />
    <meta
      name="keywords"
      content="선물 청산가 계산기, 선물 증거금 계산기, 레버리지 청산가, 마진콜 계산기, 코스피200 선물, liquidation calculator, futures margin"
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="선물 계산기 | Futures Calculator" />
    <meta
      property="og:description"
      content="선물·레버리지 포지션의 청산가와 증거금 여유를 계산하는 무료 도구."
    />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:locale:alternate" content="en_US" />
    <style>
      :root {
        color-scheme: dark;
        --boot-bg: #12151c;
        --boot-text: #e8eaed;
        --boot-muted: #9aa3b2;
        --boot-accent: #5b8def;
      }
      html,
      body {
        margin: 0;
        min-height: 100dvh;
        background: var(--boot-bg);
        color: var(--boot-text);
      }
      #root {
        min-height: 100dvh;
      }
      .app-boot {
        display: flex;
        min-height: 100dvh;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .app-boot__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        text-align: center;
      }
      .app-boot__title {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .app-boot__spinner {
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid rgba(154, 163, 178, 0.25);
        border-top-color: var(--boot-accent);
        border-radius: 50%;
        animation: app-boot-spin 0.7s linear infinite;
      }
      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot__spinner {
          animation: none;
          opacity: 0.6;
        }
      }
    </style>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
      />
    </noscript>
    <title>선물 계산기</title>
  </head>
  <body>
    <div id="root">
      <div class="app-boot" aria-busy="true" aria-live="polite">
        <div class="app-boot__inner">
          <p class="app-boot__title">선물 계산기</p>
          <div class="app-boot__spinner" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      ;(window.requestIdleCallback || function (cb) { setTimeout(cb, 1500) })(function () {
        var link = document.createElement('link')
        link.rel = 'stylesheet'
        link.href =
          'https://cdn.jsdelivr.net/gh/JetBrains/JetBrainsMono@v2.304/fonts/webfonts/JetBrainsMono-wght.css'
        document.head.appendChild(link)
      })
    </script>
  </body>
</html>
